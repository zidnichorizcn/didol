{% extends "base.html" %}
{% block content %}

<h2>Daftar Akun Penjual</h2>
<div class="form-card">
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Daftar</button>
    </form>
    <p class="helper-text" style="margin-top: 16px;">Sudah punya akun? <a href="{% url 'login' %}" class="btn-link">Login di sini</a></p>
</div>

{% endblock %}
