{% extends "base.html" %}
{% block content %}
<h2>Lupa Kata Sandi</h2>
<p class="helper-text">Masukkan email yang terdaftar, kami akan kirim link untuk reset kata sandi.</p>
<div class="form-card">
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Kirim Link Reset</button>
    </form>
</div>
{% endblock %}
