{% extends "base.html" %}
{% block content %}
<h2>Buat Kata Sandi Baru</h2>
<div class="form-card">
    {% if validlink %}
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary">Simpan Kata Sandi Baru</button>
        </form>
    {% else %}
        <p>Link reset ini tidak valid atau sudah kedaluwarsa. Silakan minta link baru.</p>
        <a href="{% url 'password_reset' %}" class="btn btn-outline">Minta Link Baru</a>
    {% endif %}
</div>
{% endblock %}
